<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Admission Form</title>
</head>
<body>

<div class="container">

    <h1>College Admission Form</h1>

    <form>

        <fieldset>
            <legend>Student Details</legend>

            <label for="fname">First Name</label>
            <input type="text" id="fname" placeholder="Enter First Name" required>

            <label for="lname">Last Name</label>
            <input type="text" id="lname" placeholder="Enter Last Name" required>

            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter Email" required>

            <label for="phone">Mobile Number</label>
            <input type="tel" id="phone" placeholder="Enter Mobile Number" required>

            <label for="dob">Date of Birth</label>
            <input type="date" id="dob">

            <label>Gender</label>

            <div class="radio">
                <input type="radio" id="male" name="gender">
                <label for="male">Male</label>

                <input type="radio" id="female" name="gender">
                <label for="female">Female</label>

                <input type="radio" id="other" name="gender">
                <label for="other">Other</label>
            </div>

            <label for="course">Course</label>

            <select id="course">
                <option>Select Course</option>
                <option>B.Tech CSE</option>
                <option>B.Tech AI</option>
                <option>BCA</option>
                <option>BBA</option>
                <option>B.Sc</option>
            </select>

            <label for="address">Address</label>

            <textarea id="address" rows="4" placeholder="Enter Address"></textarea>

            <label>Hobbies</label>

            <div class="check">
                <input type="checkbox" id="reading">
                <label for="reading">Reading</label>

                <input type="checkbox" id="music">
                <label for="music">Music</label>

                <input type="checkbox" id="sports">
                <label for="sports">Sports</label>
            </div>

            <label for="photo">Upload Photo</label>
            <input type="file" id="photo">

            <div class="buttons">
                <input type="submit" value="Submit">
                <input type="reset" value="Reset">
            </div>

        </fieldset>

    </form>

</div>
<style>

body{
    background:linear-gradient(135deg,#74b9ff,#dfe6e9);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:650px;
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

h1{
    text-align:center;
    color:#003366;
    margin-bottom:25px;
}

fieldset{
    border:2px solid #003366;
    border-radius:10px;
    padding:20px;
}

legend{
    color:#003366;
    font-size:20px;
    font-weight:bold;
    padding:0 10px;
}

label{
    display:block;
    margin-top:15px;
    margin-bottom:6px;
    font-weight:bold;
}

input[type=text],
input[type=email],
input[type=tel],
input[type=date],
select,
textarea,
input[type=file]{

    width:100%;
    padding:10px;
    border:1px solid #999;
    border-radius:5px;
    font-size:15px;
}

.radio,
.check{
    display:flex;
    gap:20px;
    align-items:center;
    margin-top:8px;
}

.radio label,
.check label{
    margin:0;
    font-weight:normal;
}

textarea{
    resize:none;
}

.buttons{
    display:flex;
    justify-content:space-between;
    margin-top:25px;
}

input[type=submit],
input[type=reset]{

    width:48%;
    padding:12px;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
    color:white;
}

input[type=submit]{
    background:#0077cc;
}

input[type=submit]:hover{
    background:#005fa3;
}

input[type=reset]{
    background:#e74c3c;
}

input[type=reset]:hover{
    background:#c0392b;
}
</style>
</body>
</html>
